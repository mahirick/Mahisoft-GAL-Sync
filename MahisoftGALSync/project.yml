name: MahisoftGALSync
options:
  bundleIdPrefix: com.mahisoft
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MahisoftGALSync:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/*.entitlements"
          - "**/Info.plist"
    resources:
      - path: Sources/Resources/GoogleOAuthConfig.plist
      - path: Sources/Resources/Secrets.plist
        optional: true
      - path: Sources/Resources/Secrets.plist.example
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mahisoft.MahisoftGALSync
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "7"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/MahisoftGALSync.entitlements
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        ARCHS: "$(ARCHS_STANDARD)"
        ONLY_ACTIVE_ARCH: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "38V22VWG47"
    dependencies:
      - package: KeychainAccess

  MahisoftGALSyncTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MahisoftGALSyncTests
      - path: Sources
        excludes:
          - "**/*.entitlements"
          - "**/*.xcassets"
          - "**/Info.plist"
          - "**/MahisoftGALSyncApp.swift"
          - "**/AppDelegate.swift"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.mahisoft.MahisoftGALSyncTests
        TEST_HOST: ""
    dependencies:
      - package: KeychainAccess

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"
